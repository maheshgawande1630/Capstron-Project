<script>
document.addEventListener("DOMContentLoaded", function(){

const button = document.querySelector(".hero button");

button.addEventListener("click", async function(e){

/* ripple animation (UNCHANGED) */
let ripple = document.createElement("span");
ripple.style.position="absolute";
ripple.style.width=ripple.style.height="20px";
ripple.style.background="rgba(255,255,255,0.6)";
ripple.style.borderRadius="50%";
ripple.style.transform="scale(0)";
ripple.style.left=e.offsetX+"px";
ripple.style.top=e.offsetY+"px";
ripple.style.animation="rippleEffect 0.6s linear";
this.appendChild(ripple);
setTimeout(()=>ripple.remove(),600);

/* ------------------------------
BACKEND CONNECTION STARTS HERE
------------------------------ */

try{

const response = await fetch("https://pathfinder-backend-t2ze.onrender.com/predict",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
answers:{
R1:8,R2:7,R3:6,
I1:9,I2:8,I3:7,
A1:5,A2:6,A3:5,
S1:4,S2:5,S3:6,
E1:7,E2:6,E3:7,
C1:5,C2:6,C3:5
}
})
});

const data = await response.json();

alert(
"Dominant Trait: "+data.dominant_trait+
"\nConfidence: "+data.confidence_percentage+"%"
);

}catch(error){

alert("Error connecting to backend");
console.error(error);

}

});

/* PARTICLES (UNCHANGED) */

particlesJS("particles-js", {
particles: {
number:{value:100,density:{enable:true,value_area:800}},
color:{value:"#6366f1"},
shape:{type:"circle"},
opacity:{value:0.6,anim:{enable:true,speed:1,opacity_min:0.2}},
size:{value:4,random:true},
line_linked:{enable:false},
move:{enable:true,speed:2,out_mode:"out"}
},
interactivity:{
events:{onhover:{enable:true,mode:"repulse"},resize:true},
modes:{repulse:{distance:120,duration:0.4}}
},
retina_detect:true
});

});
</script>
