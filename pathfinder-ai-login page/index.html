<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PathFinder AI - Discover Your Ideal Career Path</title>
    <!-- Modern Font: Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Particles background container -->
    <div id="particles-js"></div>

    <div class="login-container">
        <div class="login-card">
            <!-- Header Section -->
            <div class="card-header">
                <div class="logo-container">
                    <i class="fa-solid fa-brain logo-icon"></i>
                </div>
                <h2>PathFinder <span>AI</span></h2>
                <p>Discover Your Ideal Career Path with Intelligent AI Guidance</p>
            </div>

            <!-- Error Message State -->
            <div class="error-message" id="error-message">
                <i class="fa-solid fa-circle-exclamation"></i>
                <span>Invalid email or password. Please try again.</span>
            </div>

            <!-- Login Form -->
            <form id="login-form">
                <div class="input-group">
                    <input type="email" id="email" required placeholder=" " autocomplete="email">
                    <label for="email">Email Address</label>
                    <i class="fa-regular fa-envelope input-icon"></i>
                </div>

                <div class="input-group">
                    <input type="password" id="password" required placeholder=" " autocomplete="current-password">
                    <label for="password">Password</label>
                    <i class="fa-solid fa-lock input-icon"></i>
                    <i class="fa-solid fa-eye toggle-password" id="toggle-password"
                        title="Toggle Password Visibility"></i>
                </div>

                <div class="form-actions">
                    <label class="remember-me">
                        <input type="checkbox" id="remember">
                        <span class="checkmark"></span>
                        Remember me
                    </label>
                    <a href="#" class="forgot-password">Forgot password?</a>
                </div>

                <button type="submit" class="btn-primary">
                    <span>Log In to Dashboard</span>
                    <i class="fa-solid fa-arrow-right"></i>
                </button>
            </form>

            <div class="divider">
                <span>OR</span>
            </div>

            <!-- Alternative Login -->
            <button type="button" class="btn-google">
                <svg width="20" height="20" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path
                        d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                        fill="#4285F4" />
                    <path
                        d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                        fill="#34A853" />
                    <path
                        d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
                        fill="#FBBC05" />
                    <path
                        d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                        fill="#EA4335" />
                </svg>
                <span>Continue with Google</span>
            </button>

            <!-- Signup Link -->
            <div class="signup-link">
                Don't have an account? <a href="#">Create one</a>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
